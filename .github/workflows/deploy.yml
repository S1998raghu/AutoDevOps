name: Deploy AutoDevOps

on:
  push:
    branches: [master]

jobs:
  deploy:
    # Self-hosted runner on your Mac — has access to Docker Desktop K8s,
    # local kubeconfig, kubectl, terraform, and Claude Code CLI auth.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Create namespace (if not exists)
        run: kubectl create namespace autodevops --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject Anthropic API key as K8s Secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          kubectl create secret generic anthropic-api-key \
            --from-literal=api-key=$ANTHROPIC_API_KEY \
            --namespace autodevops \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build Docker image
        run: docker build -t autodevops:latest .

      - name: Terraform Init
        working-directory: terraform/local-k8s
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/local-k8s
        run: terraform apply -auto-approve
